name: Sentinel Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sentinel-sast:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sentinel SAST Scan
        env:
          SENTINEL_URL: ${{ secrets.SENTINEL_URL }}
          SENTINEL_TOKEN: ${{ secrets.SENTINEL_TOKEN }}
        run: |
          set -e
          RESP=$(curl -s -X POST "$SENTINEL_URL/api/webhooks/scan?token=$SENTINEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"project_name":"${{ github.event.repository.name }}","tool_type":"SAST","ref":"${{ github.ref_name }}"}')
          echo "$RESP"
          # 安全门禁：存在 block 决策则阻断构建
          echo "$RESP" | grep -q '"decision":"block"' && {
            echo "安全门禁阻断：存在 Critical/High 级别漏洞，构建失败"
            exit 1
          }
          echo "安全扫描通过（gate 非 block）"
